<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="img/miodayo.jpg">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
	<script src="script.js"></script>
	<title>Nazonohito Official Site - Contact</title>
</head>

<body>
	<header class="title">
		<h1>Contact</h1>
	</header>

	<nav class="modern-nav">
		<div class="menu-toggle" id="mobile-menu">
			<span class="bar"></span>
			<span class="bar"></span>
			<span class="bar"></span>
		</div>
	
		<ul class="nav-list">
			<li><a href="index.html" class="nav-item">Home</a></li>
			<li><a href="profile.html" class="nav-item">Profile</a></li>
			<li><a href="gallery.html" class="nav-item">Gallery</a></li>
			<li><a href="contact.html" class="nav-item">Contact</a></li>
		</ul>
	</nav>

	<main class="glass-card contact-container">
		<h2>Contact Me</h2>
		<p>当サイトのご意見やご感想などお気軽にどうぞ。</p>

		<form class="contact-form">
			<div class="form-group">
				<label>Name</label>
				<input type="text" placeholder="Your Name" required>
			</div>
			<div class="form-group">
				<label>Email</label>
				<input type="email" placeholder="example@mail.com" required>
			</div>
			<div class="form-group">
				<label>Message</label>
				<textarea rows="5" placeholder="How can I help you?" required></textarea>
			</div>
			<button type="submit" class="modern-btn">Send Message</button>
		</form>
	</main>

	<footer class="modern-footer">
		<p>&copy; 2026 Nazonohito. Built with passion feat.Gemini.</p>
		<a class="pakutaso" href="https://www.pakutaso.com" target="_blank" rel="noopener">Special Thanks to ぱくたそ</a>
	</footer>

	<script>
		document.addEventListener('mousemove', (e) => {
			const ripple = document.createElement('div');
			ripple.className = 'ripple';
			document.body.appendChild(ripple);
			ripple.style.left = e.clientX + 'px';
			ripple.style.top = e.clientY + 'px';
			setTimeout(() => { ripple.remove(); }, 800);
		});
	</script>
</body>

</html>
